<svg xmlns="http://www.w3.org/2000/svg" width="600" height="60" viewBox="0 0 600 60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&amp;display=swap');
      
      .typing-text {
        font-family: 'Poppins', sans-serif;
        font-size: 20px;
        font-weight: 600;
        fill: #a855f7; /* Vibrant MERN Purple */
        overflow: hidden;
        white-space: nowrap;
        border-right: 3px solid #61DAFB; /* React Blue Cursor */
        display: inline-block;
        
        /* CSS Typing Animation */
        animation: 
          typing 4s steps(45, end) infinite alternate,
          blink 0.75s step-end infinite;
      }

      @keyframes typing {
        from { width: 0 }
        to { width: 100% }
      }

      @keyframes blink {
        from, to { border-color: transparent }
        50% { border-color: #61DAFB; }
      }
      
      .wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        height: 100%;
      }
    </style>
  </defs>

  <g class="wrapper">
    <foreignObject x="0" y="15" width="600" height="40">
      <div xmlns="http://www.w3.org/1999/xhtml" style="text-align: center;">
        <span class="typing-text">🚀 Passionate MERN Stack Developer in the Making</span>
      </div>
    </foreignObject>
  </g>
</svg>
