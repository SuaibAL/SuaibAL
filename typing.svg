<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="600" height="80" viewBox="0 0 600 80">
  <!-- Google Font: Poppins -->
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@600&amp;display=swap');
      
      .typing-text {
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 20px;
        fill: #9333ea; /* Purple color */
      }

      /* Cursor Animation */
      .cursor {
        font-family: 'Poppins', sans-serif;
        font-weight: 600;
        font-size: 22px;
        fill: #61DAFB; /* React Blue */
        animation: blink 0.8s infinite;
      }

      /* Floating Symbols Animation */
      .symbol {
        font-family: Arial, sans-serif;
        font-size: 16px;
        font-weight: bold;
        fill: rgba(110, 110, 110, 0.4);
        animation: float 4s infinite ease-in-out;
      }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
        50% { transform: translateY(-30px) rotate(20deg); opacity: 0.6; }
      }
    </style>
  </defs>

  <!-- Floating Coding Symbols (for 'Jos' look) -->
  <text x="50" y="30" class="symbol" style="animation-delay: 0s;">&lt;/&gt;</text>
  <text x="530" y="60" class="symbol" style="animation-delay: 1s;">{ }</text>
  <text x="150" y="70" class="symbol" style="animation-delay: 2s;">const</text>
  <text x="450" y="25" class="symbol" style="animation-delay: 3s;">=&gt;</text>
  <text x="300" y="75" class="symbol" style="animation-delay: 1.5s;">props</text>
  
  <!-- Typing Text Container -->
  <text x="300" y="45" text-anchor="middle" class="typing-text">
    <tspan id="text-target"></tspan>
    <tspan class="cursor">|</tspan>
  </text>

  <!-- SVG Script to simulate typing -->
  <script type="text/javascript">
    const text = "🚀 Passionate MERN Stack Developer in the Making";
    const target = document.getElementById('text-target');
    let index = 0;

    function type() {
      if (index &lt; text.length) {
        target.textContent += text.charAt(index);
        index++;
        setTimeout(type, 100); // Typing speed
      }
    }
    type();
  </script>
</svg>
